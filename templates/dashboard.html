<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#ee4d2d;
color:white;
padding:15px;
font-size:20px;
}

.container{
padding:30px;
}

.card{
background:white;
padding:15px;
margin:10px;
width:220px;
display:inline-block;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
}

.btn{
display:inline-block;
padding:6px 10px;
margin:5px;
background:#ee4d2d;
color:white;
text-decoration:none;
border-radius:4px;
font-size:14px;
}

.btn.delete{
background:red;
}

.topbar{
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="header">
⚙ Dashboard quản lý shop
</div>

<div class="container">

<div class="topbar">

<a class="btn" href="/">🏠 Trang chủ</a>

<a class="btn" href="/add-product/">➕ Thêm sản phẩm</a>

</div>

{% for product in products %}

<div class="card">

{% if product.image %}
<img src="{{product.image.url}}">
{% else %}
<img src="https://via.placeholder.com/200">
{% endif %}

<h3>{{product.name}}</h3>

<p>{{product.price}} VND</p>

<a class="btn" href="/edit-product/{{product.id}}/">✏ Sửa</a>

<a class="btn delete" href="/delete-product/{{product.id}}/">❌ Xóa</a>

</div>

{% endfor %}

</div>

</body>
</html>
