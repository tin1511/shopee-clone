<!DOCTYPE html>
<html>
<head>
<title>Giỏ hàng</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
}

.container {
    width: 80%;
    margin: auto;
}

.card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.btn {
    padding: 5px 10px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

.green { background: #28a745; color: white; }
.orange { background: #ffc107; }
.red { background: #dc3545; color: white; }

.qty {
    display: flex;
    align-items: center;
    gap: 5px;
}
</style>

<script>
function update(url){
    fetch(url)
    .then(() => location.reload())
}
</script>

</head>

<body>

<div class="container">

<h2>🛒 Giỏ hàng</h2>

{% for item in cart_items %}
<div class="card">

    <div>
        <h4>{{ item.product.name }}</h4>
        <p>{{ item.product.price }} VND</p>
    </div>

    <div class="qty">
        <button class="btn orange" onclick="update('/cart/decrease/{{item.id}}/')">-</button>
        <b>{{ item.quantity }}</b>
        <button class="btn green" onclick="update('/cart/increase/{{item.id}}/')">+</button>
    </div>

    <div>
        <button class="btn red" onclick="update('/cart/remove/{{item.id}}/')">Xoá</button>
    </div>

</div>
{% endfor %}

<h3>💰 Tổng tiền: {{ total }} VND</h3>

<a href="/checkout/">
    <button style="background:green;color:white;padding:10px;">
        Thanh toán 🚀
    </button>
</a>
</button>

</div>

</body>
</html>
