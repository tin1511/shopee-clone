<!DOCTYPE html>
<html>
<head>
    <title>Giỏ hàng</title>
    <style>
        body { font-family: Arial; }
        .card {
            background: #f5f5f5;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
        }
        button {
            padding: 5px 10px;
            margin: 2px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        .btn-add { background: green; color: white; }
        .btn-sub { background: orange; color: white; }
        .btn-del { background: red; color: white; }
    </style>
</head>
<body>

<h2>🛒 Giỏ hàng của bạn</h2>

{% for item in cart_items %}
<div class="card">
    <h4>{{ item.product.name }}</h4>
    <p>Giá: {{ item.product.price }} VND</p>

    <p>
        SL: {{ item.quantity }}
        <a href="{% url 'increase' item.id %}">
            <button class="btn-add">+</button>
        </a>
        <a href="{% url 'decrease' item.id %}">
            <button class="btn-sub">-</button>
        </a>
    </p>

    <a href="{% url 'remove' item.id %}" 
       onclick="return confirm('Xoá sản phẩm này?')">
        <button class="btn-del">❌ Xoá</button>
    </a>
</div>
{% endfor %}

<h3>💰 Tổng tiền: {{ total }} VND</h3>

<a href="/">← Quay lại mua hàng</a>

</body>
</html>
