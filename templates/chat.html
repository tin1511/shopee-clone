<!DOCTYPE html>
<html>

<head>

<title>Chat với shop</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
}

.chatbox{
width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

.message{
padding:8px;
margin:5px 0;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<a href="/" style="
background:#ff5722;
color:white;
padding:8px 15px;
border-radius:5px;
text-decoration:none;
">
⬅ Quay lại trang chủ
</a>

<div class="chatbox">

<h2>💬 Chat với shop</h2>

<h3>Chat với {{ other_user.username }}</h3>

<div style="height:300px;overflow:auto">

{% for m in messages %}

{% if m.sender == request.user %}

<p style="text-align:right;color:blue">
Bạn: {{m.content}}
</p>

{% else %}

<p style="text-align:left;color:green">
{{other_user.username}}: {{m.content}}
</p>

{% endif %}

{% endfor %}

</div>

<form method="post">

{% csrf_token %}

<input name="text" placeholder="Nhập tin nhắn..." style="width:80%">

<button>Gửi</button>

</form>

</div>

</body>

</html>
